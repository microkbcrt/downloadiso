# .github/workflows/download.yml

name: Large File Downloader (Split)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '要下载的大文件的URL'
        required: true
      file_name:
        description: '保存的文件名 (必须带后缀)'
        required: true

jobs:
  download_and_split_job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 增加磁盘空间，防止下载大文件时空间不足
      - name: Free up disk space
        run: |
          echo "清理前磁盘空间:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "清理后磁盘空间:"
          df -h

      - name: Download large file
        run: |
          echo "开始下载: ${{ inputs.file_name }}"
          # 使用 curl, -L 跟随跳转, --retry 增加稳定性
          curl -L --retry 5 --retry-delay 5 -o "${{ inputs.file_name }}" "${{ inputs.file_url }}"
          echo "下载完成!"

      - name: Split the file into 450MB chunks
        run: |
          mkdir split_files
          split -b 450M "${{ inputs.file_name }}" split_files/part_
          echo "文件已分割!"

      - name: Upload split parts as artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact 的名字，每次运行都不同，防止冲突
          name: split-file-${{ github.run_id }}
          # 上传整个文件夹
          path: split_files/
