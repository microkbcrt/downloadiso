# .github/workflows/release-downloader.yml

name: Download to Release (Split)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '要下载的大文件的URL'
        required: true
      file_name:
        description: '保存的文件名 (必须带后缀)'
        required: true

# 必须！允许工作流创建 Release
permissions:
  contents: write

jobs:
  create_release_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 为大文件释放更多磁盘空间
      - name: Free up disk space
        run: |
          echo "清理前磁盘空间:"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          echo "清理后磁盘空间:"
          df -h

      - name: Download large file
        run: |
          echo "开始下载: ${{ inputs.file_name }}"
          curl -L --retry 5 --retry-delay 5 -o "${{ inputs.file_name }}" "${{ inputs.file_url }}"
          echo "下载完成!"

      - name: Split the file into 1.8GB chunks
        run: |
          mkdir release_assets
          # 分割成最大 1.8GB 的文件块，以确保小于 Release 的 2GB 限制
          split -b 1800M "${{ inputs.file_name }}" release_assets/part_
          echo "文件已分割!"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          # 使用通配符 * 上传 release_assets 文件夹下的所有文件
          files: release_assets/*
          
          # Release 的名字
          name: "Release - ${{ inputs.file_name }}"
          
          # Release 的标签，使用唯一的 Job ID 确保不重复
          tag_name: "download-${{ github.run_id }}"
          
          # Release 的描述
          body: |
            File downloaded from:
            `${{ inputs.file_url }}`
            
            **重要:** 请下载所有 'part_' 文件并在本地合并它们。
            
          # 标记为预发布，不会通知仓库关注者
          prerelease: true
